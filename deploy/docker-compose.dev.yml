services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    container_name: urlog-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: urlog
      CLICKHOUSE_USER: urlog
      CLICKHOUSE_PASSWORD: urlog
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 12

  redpanda:
    image: redpandadata/redpanda:v24.3.3
    container_name: urlog-redpanda
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 12

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.117.0
    container_name: urlog-otel-collector
    command: ["--config=env:OTELCOL_CONFIG"]
    environment:
      OTELCOL_CONFIG: |
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: 0.0.0.0:4317
              http:
                endpoint: 0.0.0.0:4318

        processors:
          batch: {}
          memory_limiter:
            check_interval: 1s
            limit_mib: 256

        exporters:
          debug:
            verbosity: basic

        service:
          pipelines:
            traces:
              receivers: [otlp]
              processors: [memory_limiter, batch]
              exporters: [debug]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    depends_on:
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy
