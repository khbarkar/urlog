apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: urlog-default-deny-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: urlog-api-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: urlog-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080

