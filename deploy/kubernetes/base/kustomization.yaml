apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: urlog-system

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - rbac.yaml
  - configmap.yaml
  - api.yaml
  - worker.yaml
  - operator.yaml
  - service.yaml
  - networkpolicy.yaml

images:
  - name: ghcr.io/khbarkar/urlog-api
    newTag: dev
  - name: ghcr.io/khbarkar/urlog-worker
    newTag: dev
  - name: ghcr.io/khbarkar/urlog-operator
    newTag: dev

