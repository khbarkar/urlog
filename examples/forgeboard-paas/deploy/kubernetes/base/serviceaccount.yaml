apiVersion: v1
kind: ServiceAccount
metadata:
  name: forgeboard-api
  namespace: forgeboard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forgeboard-api-read
  namespace: forgeboard
rules:
  - apiGroups: [""]
    resources: ["configmaps", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forgeboard-api-read
  namespace: forgeboard
subjects:
  - kind: ServiceAccount
    name: forgeboard-api
roleRef:
  kind: Role
  name: forgeboard-api-read
  apiGroup: rbac.authorization.k8s.io
