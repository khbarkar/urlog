apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgeboard-frontend
  namespace: forgeboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: forgeboard-frontend
  template:
    metadata:
      labels:
        app: forgeboard-frontend
    spec:
      containers:
        - name: frontend
          image: forgeboard/frontend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
          livenessProbe:
            httpGet:
              path: /
              port: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: forgeboard-frontend
  namespace: forgeboard
spec:
  selector:
    app: forgeboard-frontend
  ports:
    - port: 80
      targetPort: 8080
