apiVersion: urlog.io/v1alpha1
kind: SecretBackendCatalog
metadata:
  name: supported-secret-backends
spec:
  universal_rules:
    cleartext_config: forbidden
    cleartext_logs: forbidden
    cleartext_reports: forbidden
    cleartext_prompts: forbidden
    cleartext_traces: forbidden
    runtime_resolution_only: required
    audit_every_access: required

  backends:
    - id: local-sops-age
      status: phase-1
      description: Offline encrypted YAML using SOPS and age.
      best_for:
        - air_gapped_lab
        - local_learning
        - first_bootstrap_without_secret_server
      required_refs:
        - age_identity_ref
        - encrypted_file_ref

    - id: aws-secrets-manager
      status: phase-1-compatible
      description: AWS Secrets Manager or SSM Parameter Store through cloud identity or MCP.
      best_for:
        - aws_customers
        - enterprise_bootstrap
        - managed_cloud_secrets
      required_refs:
        - role_ref
        - region
        - allowed_paths
      supported_access_modes:
        - workload_identity
        - mcp
        - short_lived_bootstrap_token

    - id: azure-key-vault
      status: phase-1-compatible
      description: Azure Key Vault through cloud identity or MCP.
      best_for:
        - azure_customers
        - enterprise_bootstrap
      required_refs:
        - tenant_ref
        - vault_ref
        - role_ref
        - allowed_paths
      supported_access_modes:
        - workload_identity
        - mcp

    - id: gcp-secret-manager
      status: phase-1-compatible
      description: Google Secret Manager through workload identity or MCP.
      best_for:
        - gcp_customers
        - enterprise_bootstrap
      required_refs:
        - project_ref
        - service_account_ref
        - allowed_paths
      supported_access_modes:
        - workload_identity
        - mcp

    - id: vault-compatible
      status: phase-2
      description: HashiCorp Vault or OpenBao.
      best_for:
        - self_hosted_enterprise
        - high_security_air_gap
      required_refs:
        - address_ref
        - auth_method_ref
        - allowed_paths

    - id: password-manager
      status: phase-3
      description: 1Password, Bitwarden, or customer password manager adapters.
      best_for:
        - teams_without_cloud_secret_manager
        - customer_specific_integrations
      required_refs:
        - provider_ref
        - vault_ref
        - item_path_allowlist

